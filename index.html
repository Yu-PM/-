<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <title>支付知多少 · 测出你的江湖地位</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/base.css">
  <link rel="stylesheet" href="./styles/home.css">
  <link rel="stylesheet" href="./styles/quiz.css">
  <link rel="stylesheet" href="./styles/ai-reveal.css">
  <link rel="stylesheet" href="./styles/result.css">
</head>
<body>

<!-- ========== 01 首页 ========== -->
<section id="view-home" class="view">
  <div class="home-bg"></div>
  <div class="home-content">
    <div class="home-seal">
      <span class="home-seal-text">密</span>
    </div>
    <h1 class="home-title">支付<br>知多少</h1>
    <p class="home-subtitle">测一测你在<br>支付江湖中的身份</p>
    <button id="btn-start" class="btn-cta">开始闯荡江湖</button>
  </div>
</section>


<!-- ========== 02 选择难度 ========== -->
<section id="view-levels" class="view">
  <div class="levels-header">
    <h2 class="levels-title">选择你的境界</h2>
    <p class="levels-subtitle">不同境界，历练不同</p>
  </div>
  <div class="levels-list">

    <div class="level-row" data-level="L1">
      <div class="level-row-badge badge-l1"><span class="seal-text">学</span></div>
      <div class="level-row-info">
        <div class="level-row-name">支付学徒</div>
        <div class="level-row-desc">初入江湖，略知皮毛</div>
      </div>
      <div class="level-row-arrow">›</div>
    </div>

    <div class="level-row" data-level="L2">
      <div class="level-row-badge badge-l2"><span class="seal-text">进</span></div>
      <div class="level-row-info">
        <div class="level-row-name">支付进阶者</div>
        <div class="level-row-desc">熟悉流程，指引方道</div>
      </div>
      <div class="level-row-arrow">›</div>
    </div>

    <div class="level-row" data-level="L3">
      <div class="level-row-badge badge-l3"><span class="seal-text">探</span></div>
      <div class="level-row-info">
        <div class="level-row-name">支付探索者</div>
        <div class="level-row-desc">洞察玄机，设计巧妙</div>
      </div>
      <div class="level-row-arrow">›</div>
    </div>

    <div class="level-row" data-level="L4">
      <div class="level-row-badge badge-l4"><span class="seal-text">达</span></div>
      <div class="level-row-info">
        <div class="level-row-name">支付达人</div>
        <div class="level-row-desc">精研精通，感悟支付真谛</div>
      </div>
      <div class="level-row-arrow">›</div>
    </div>

  </div>
</section>


<!-- ========== 03 答题页 ========== -->
<section id="view-quiz" class="view">
  <div id="quiz-loading" class="tip-box" style="display:none;">
    <div class="tip-icon">⏳</div>
    <p>正在布置试炼…</p>
  </div>

  <div id="quiz-content" style="display:none; width:100%;">
    <div class="quiz-header">
      <div class="quiz-top">
        <span class="quiz-level-tag">L1 · 支付学徒</span>
        <span class="quiz-type-tag">单选题</span>
      </div>
      <div class="quiz-progress-bar">
        <div class="quiz-progress-text">第 1 题 / 共 6 题</div>
        <div class="quiz-dots"></div>
      </div>
    </div>

    <div class="quiz-card">
      <div id="quiz-question" class="quiz-question"></div>
      <div id="quiz-options" class="quiz-options"></div>
      <div id="quiz-explanation" class="quiz-explanation">
        <div class="quiz-explanation-label">江湖解析</div>
        <div id="quiz-explanation-text"></div>
      </div>
    </div>

    <div class="quiz-footer">
      <button id="btn-next" class="btn-gold">下一题</button>
    </div>
  </div>
</section>


<!-- ========== 04 AI推演页 ========== -->
<section id="view-reveal" class="view">
  <div class="reveal-content">
    <div class="reveal-title">正在推演你的<br>江湖身份…</div>
    <div class="reveal-orb-area">
      <div class="reveal-orb">
        <div class="reveal-orb-inner"></div>
        <div class="reveal-orb-ring"></div>
        <div class="reveal-orb-ring reveal-orb-ring-2"></div>
      </div>
      <div class="reveal-radar">
        <div class="reveal-radar-line"></div>
        <div class="reveal-axis reveal-axis-1">
          <span class="reveal-axis-dot"></span>
          <span class="reveal-axis-label">监督合规</span>
        </div>
        <div class="reveal-axis reveal-axis-2">
          <span class="reveal-axis-dot"></span>
          <span class="reveal-axis-label">支付业务</span>
        </div>
        <div class="reveal-axis reveal-axis-3">
          <span class="reveal-axis-dot"></span>
          <span class="reveal-axis-label">支付治理</span>
        </div>
      </div>
    </div>
    <div class="reveal-status">AI观星台 · 推演中</div>
    <div class="reveal-dots">
      <span></span><span></span><span></span>
    </div>
  </div>
</section>


<!-- ========== 05 结果页 ========== -->
<section id="view-result" class="view">
  <div class="scroll-wrap">
    <div class="result-banner">
      <div class="result-banner-title">支付江湖榜</div>
      <div class="result-banner-sub">你的江湖身份是</div>
    </div>

    <div class="identity-card">
      <div class="identity-silhouette-wrap">
        <div id="result-silhouette" class="identity-silhouette"></div>
        <div class="identity-silhouette-ink"></div>
      </div>
      <div id="result-level-tag" class="identity-label">L1 · 支付学徒</div>
      <div id="result-name" class="identity-name">天机匠人</div>
    </div>

    <div class="result-section">
      <div class="result-section-title">江湖语录</div>
      <div id="result-quote" class="result-quote-text"></div>
    </div>

    <div class="result-section">
      <div class="result-section-title">AI点评</div>
      <div id="result-ai-comment" class="result-ai-comment"></div>
    </div>

    <div class="result-section">
      <div class="result-section-title">修炼建议</div>
      <ul id="result-steps" class="result-steps"></ul>
    </div>

    <div class="result-actions">
      <button id="btn-retry" class="btn-outline">再测一次</button>
      <button id="btn-poster" class="btn-gold">分享江湖</button>
    </div>
  </div>
</section>


<!-- ========== 06 海报弹窗 ========== -->
<div id="poster-modal">
  <div class="poster-modal-inner">
    <div class="poster-modal-title">✦ 我的江湖身份 ✦</div>
    <canvas id="poster-canvas"></canvas>
    <div class="poster-hint">移动端：长按图片保存 · PC端：点击下载</div>
    <div class="poster-actions">
      <button id="btn-download" class="btn-gold">下载海报</button>
      <button id="poster-close" class="btn-outline">关闭</button>
    </div>
  </div>
</div>


<script src="./js/data.js"></script>
<script src="./js/quiz-engine.js"></script>
<script src="./js/calc-engine.js"></script>
<script src="./js/result.js"></script>
<script src="./js/poster.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
